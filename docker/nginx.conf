server {
    listen 80;
    server_name _ localhost;
    root /var/www/html/public;

    client_max_body_size 72M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;
    charset utf-8;

    # Compress text responses (HTML, Inertia JSON, JS, CSS, SVG).
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Vite emits content-hashed files under /build/assets — cache them forever.
    location ^~ /build/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Preserve the full Host header (with port) so Laravel reconstructs
        # request URLs correctly behind the published host port.
        fastcgi_param HTTP_HOST $http_host;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
